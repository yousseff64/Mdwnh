<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>مشاريعنا | مدونة ستوديو</title>
  <meta name="description" content="تصفح أعمال مدونة ستوديو واكتشف المشروع الذي يناسبك بمساعدة نظامنا الذكي">
  <link rel="icon" href="../Circle Logo.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="projects.css?v=2.0">
</head>
<body>

  <!-- ===== NAVBAR ===== -->
  <nav class="navbar">
    <div class="nav-inner">
      <a href="../" class="nav-logo-link">
        <img src="../logo.png" alt="مدونة ستوديو" class="nav-logo">
      </a>
      <a href="../" class="nav-back">← الرئيسية</a>
    </div>
  </nav>

  <!-- ===== PHASE 1: SELECTION ===== -->
  <section id="phase-selection" class="phase active-phase">

    <!-- Hero Section (AI Filter) -->
    <div class="selection-hero">
      <!-- Animated background -->
      <div class="bg-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
        <div class="orb orb-4"></div>
      </div>

      <!-- 4 thinking dots -->
      <div class="dots-row" id="dots-row">
        <div class="dot dot-1"></div>
        <div class="dot dot-2"></div>
        <div class="dot dot-3"></div>
        <div class="dot dot-4"></div>
      </div>

      <!-- Headline -->
      <h1 class="main-title">أنا أريد....</h1>
      <p class="main-subtitle">اختر ما يعجبك وسنجد لك أفضل أعمالنا</p>

      <!-- Tag pills -->
      <div class="tags-cloud" id="tags-cloud">
        <button class="tag-pill" data-tag="انيميشن">🎨 انيميشن</button>
        <button class="tag-pill" data-tag="موشن">✨ موشن جرافكس</button>
        <button class="tag-pill" data-tag="مونتاج">🎬 مونتاج</button>
        <button class="tag-pill" data-tag="تصوير">📷 تصوير</button>
        <button class="tag-pill" data-tag="كوميكس">💬 كوميكس</button>
        <button class="tag-pill" data-tag="هوية">🖌️ هوية بصرية</button>
        <button class="tag-pill" data-tag="تقرير">📋 تقرير</button>
        <button class="tag-pill" data-tag="تصميم">🎭 تصميم</button>
      </div>

      <!-- Continue button -->
      <button class="btn-continue" id="btn-continue" disabled>متابعة →</button>

      <!-- OR Separator -->
      <div class="hero-separator">
        <span>أو</span>
      </div>

      <button class="btn-hero-browse" id="btn-hero-browse">تصفح المشاريع ↓</button>
    </div>

    <!-- Browse Section (New) -->
    <div class="browse-section">
      <div class="browse-container">
        <h2 class="browse-title">تصفح</h2>
        
        <div class="browse-controls">
          <div class="search-wrap">
            <input type="text" id="browse-search" placeholder="ابحث عن مشروع بالاسم...">
            <span class="search-icon">🔍</span>
          </div>
          
          <div class="filter-panel-wrap">
            <button class="btn-filter-toggle" id="btn-filter-toggle">
              تصفية بالوسوم 🏷️
            </button>
            
            <div class="browse-tags-wrap hidden" id="browse-tags-wrap">
              <div class="tags-cloud small" id="browse-tags-cloud">
                <!-- Populated by JS -->
              </div>
            </div>
          </div>
        </div>

        <div class="all-projects-grid" id="all-projects-grid">
          <!-- Populated by JS -->
        </div>
      </div>
    </div>

  </section>

  <!-- ===== PHASE 2: LOADING ===== -->
  <section id="phase-loading" class="phase">

    <!-- Spinning circle of dots -->
    <div class="loading-ring" id="loading-ring">
      <div class="ring-dot ring-dot-1"></div>
      <div class="ring-dot ring-dot-2"></div>
      <div class="ring-dot ring-dot-3"></div>
      <div class="ring-dot ring-dot-4"></div>
    </div>

    <!-- Rotating loading text -->
    <div class="loading-text-wrap">
      <p class="loading-text" id="loading-text"></p>
    </div>

  </section>

  <!-- ===== PHASE 3: RESULTS ===== -->
  <section id="phase-results" class="phase">

    <div class="results-header">
      <div class="dots-row small" id="dots-row-results">
        <div class="dot dot-1"></div>
        <div class="dot dot-2"></div>
        <div class="dot dot-3"></div>
        <div class="dot dot-4"></div>
      </div>
      <h2 class="results-title" id="results-title">وجدنا لك هذا!</h2>
      <p class="results-sub">إليك أفضل ما يتناسب مع اختياراتك</p>
    </div>

    <!-- Cards grid -->
    <div class="cards-grid" id="cards-grid">
      <!-- Populated by JS -->
    </div>

    <!-- Action Buttons -->
    <div class="results-actions">
      <!-- Main Actions Group -->
      <div id="main-actions" class="actions-group">
        <button class="btn-want-same" id="btn-want-same">أريد مثله! 🚀</button>
        <button class="btn-restart" id="btn-restart">← ابحث مجدداً</button>
      </div>

      <!-- Selection Actions Group (shown instead of main actions when selection mode is active) -->
      <div id="selection-actions" class="actions-group hidden">
        <div class="selection-btns-row">
          <button class="btn-confirm-select" id="btn-confirm-select" disabled>تأكيد الاختيار ✉️</button>
          <button class="btn-cancel-select" id="btn-cancel-select">إلغاء</button>
        </div>
      </div>
    </div>

    <!-- Contact Choice Modal -->
    <div class="contact-modal hidden" id="contact-modal">
      <div class="contact-modal-content">
        <h3>كيف تود التواصل معنا؟</h3>
        <p>اختر الوسيلة التي تناسبك لإرسال طلبك</p>
        <div class="contact-options">
          <button class="btn-contact-option whatsapp" id="btn-whatsapp-choice">
            واتساب 💬
          </button>
          <button class="btn-contact-option email" id="btn-email-choice">
            بريد إلكتروني ✉️
          </button>
        </div>
        <button class="btn-modal-close" id="btn-modal-close">إغلاق</button>
      </div>
    </div>

  </section>

  <script src="projects.js"></script>
</body>
</html>
