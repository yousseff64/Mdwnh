<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>باب الحجرة - مدونة ستوديو</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">
    
    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="../Circle Logo.png" type="image/png">
</head>
<body>
    
    <!-- Navigation Bar -->
    <nav class="flipbook-nav">
        <a href="../index.html" class="btn-back">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" class="bi bi-arrow-right" viewBox="0 0 16 16">
              <path fill-rule="evenodd" d="M1 8a.5.5 0 0 1 .5-.5h11.793l-3.147-3.146a.5.5 0 0 1 .708-.708l4 4a.5.5 0 0 1 0 .708l-4 4a.5.5 0 0 1-.708-.708L13.293 8.5H1.5A.5.5 0 0 1 1 8z"/>
            </svg>
            العودة
        </a>
        <div class="logo">
            <img src="../logo.png" alt="Mdwnh Studio">
        </div>
        <div class="book-title">باب الحجرة</div>
    </nav>

    <!-- Main Container -->
    <main class="flipbook-wrapper">
        <div id="loading" class="loading-state">
            <div class="spinner"></div>
            <p>جاري تحضير الصفحات...</p>
        </div>

        <div class="container">
            <!-- Mobile Swipe Indicator -->
            <div class="swipe-indicator" id="swipe-indicator">
                <div class="hand-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" fill="currentColor" viewBox="0 0 16 16">
                        <path d="M10.5 1a2 2 0 0 1 2 2v7.5l-1.35 1.35a.5.5 0 0 1-.708 0l-3-3a.5.5 0 0 1 0-.708L10.5 5V3a1 1 0 0 0-2 0v7a.5.5 0 0 1-1 0V3a1 1 0 0 0-2 0v8a.5.5 0 0 1-1 0V4a1 1 0 0 0-2 0v7.586l-2.146-2.147a.5.5 0 0 0-.708.708l3 3A1.5 1.5 0 0 0 4.5 14h6a1.5 1.5 0 0 0 1.5-1.5v-8a2 2 0 0 1 2-2z"/>
                    </svg>
                </div>
                <div class="swipe-text">اسحب لليمين للتقليب</div>
            </div>

            <div id="book" class="flipbook">
                <!-- Pages dynamically inserted here -->
            </div>
        </div>

        <!-- Controls -->
        <div class="bottom-controls hidden" id="controls">
            <button id="btn-next" class="btn-icon" aria-label="Next Page">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" class="bi bi-chevron-right" viewBox="0 0 16 16">
                  <path fill-rule="evenodd" d="M4.646 1.646a.5.5 0 0 1 .708 0l6 6a.5.5 0 0 1 0 .708l-6 6a.5.5 0 0 1-.708-.708L10.293 8 4.646 2.354a.5.5 0 0 1 0-.708z"/>
                </svg>
            </button>
            <div class="page-counter">
                <span id="page-current">--</span> / <span id="page-total">--</span>
            </div>
            <button id="btn-prev" class="btn-icon" aria-label="Previous Page">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" class="bi bi-chevron-left" viewBox="0 0 16 16">
                  <path fill-rule="evenodd" d="M11.354 1.646a.5.5 0 0 1 0 .708L5.707 8l5.647 5.646a.5.5 0 0 1-.708.708l-6-6a.5.5 0 0 1 0-.708l6-6a.5.5 0 0 1 .708 0z"/>
                </svg>
            </button>
        </div>
    </main>

    <!-- StPageFlip Library -->
    <script src="https://cdn.jsdelivr.net/npm/page-flip@2.0.7/dist/js/page-flip.browser.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
